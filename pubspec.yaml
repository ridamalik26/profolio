name: profolio
description: "A professional portfolio app with Supabase authentication."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  file_picker: ^8.1.2
  url_launcher: ^6.3.0

  # Fonts
  google_fonts: ^6.2.1

  # Env / APIs
  flutter_dotenv: ^6.0.1
  google_generative_ai: ^0.4.7

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Loading skeletons
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F5F1E8"
  image: assets/splash/splash_logo.png
  android_12:
    color: "#F5F1E8"
    image: assets/splash/splash_logo.png
